name: CI + Deploy

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

jobs:
  ci:
    runs-on: ubuntu-latest
    

    steps:
      - name: Baixar código
        uses: actions/checkout@v3

      - name: Instalar Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Instalar dependências
        run: |
          npm init -y
          npm install htmlhint stylelint stylelint-config-standard

      - name: Validar HTML
        run: npx htmlhint "**/*.html"

      - name: Validar CSS
        run: npx stylelint "**/*.css"

  pre_deploy:
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Baixar cÃ³digo
        uses: actions/checkout@v3

      - name: Validar arquivos publicados
        run: |
          test -f index.html
          test -f style.css

      - name: Empacotar preview do deploy
        run: |
          tar \
            --exclude=".git" \
            --exclude=".github" \
            -czf site-preview.tgz .

      - name: Salvar artefato do preview
        uses: actions/upload-artifact@v4
        with:
          name: site-preview
          path: site-preview.tgz

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Baixar código
        uses: actions/checkout@v3

      - name: Deploy no GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./

  git:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:

      - name: Run Discord Webhook
        uses: Sniddl/discord-commits@v1.8
        with:
          webhook: ${{ secrets.DISCORD_PR_ALERT }}
          template: avatar-with-link
          include-extras: true
          last-commit-only: true
        
